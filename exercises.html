<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP Fit | Exercise Library</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/components.css">
    <link rel="stylesheet" href="CSS/animations.css">
    <link rel="stylesheet" href="CSS/pages.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="sidebar">
        <div class="logo"><h2>ASP Fit</h2></div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="tracker.html">Tracker</a></li>
            <li><a href="exercises.html" class="active">Exercises</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="learn.html">Learn</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <button class="nav-theme-btn" onclick="toggleTheme()">🌙 Theme</button>
    </nav>

    <main class="exercises-content" role="main">

        <header class="exercises-header">
            <div>
                <h1>Exercise Library</h1>
                <p>Master your form. Find new movements.</p>
            </div>
        </header>

        <!-- Search + Filter row -->
        <div class="exercises-controls">
            <div class="search-container">
                <input type="text" id="exercise-search" placeholder="🔍 Search exercises...">
            </div>
            <div class="filter-bar" id="filter-bar">
                <button class="filter-btn active" data-muscle="All">All</button>
                <button class="filter-btn" data-muscle="Chest">Chest</button>
                <button class="filter-btn" data-muscle="Back">Back</button>
                <button class="filter-btn" data-muscle="Legs">Legs</button>
                <button class="filter-btn" data-muscle="Shoulders">Shoulders</button>
                <button class="filter-btn" data-muscle="Arms">Arms</button>
                <button class="filter-btn" data-muscle="Core">Core</button>
            </div>
        </div>

        <!-- Add Custom Exercise -->
        <div class="card custom-exercise-form-card">
            <h3>➕ Add Custom Exercise</h3>
            <form id="add-custom-exercise-form">
                <div class="custom-form-row">
                    <div class="input-group">
                        <label for="custom-ex-name">Exercise Name</label>
                        <input type="text" id="custom-ex-name" placeholder="e.g. Bulgarian Split Squat" required>
                    </div>
                    <div class="input-group">
                        <label for="custom-ex-muscle">Muscle Group</label>
                        <select id="custom-ex-muscle" required>
                            <option value="Chest">Chest</option>
                            <option value="Back">Back</option>
                            <option value="Legs">Legs</option>
                            <option value="Shoulders">Shoulders</option>
                            <option value="Arms">Arms</option>
                            <option value="Core">Core</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add</button>
                </div>
            </form>
        </div>

        <!-- Exercise Count -->
        <p class="exercise-count" id="exercise-count"></p>

        <!-- Exercise Grid — rendered by JS -->
        <div class="exercise-grid" id="exercise-grid"></div>

        <!-- Toast -->
        <div id="ex-toast" class="toast"></div>

    </main>

    <script src="JS/app.js"></script>
    <script src="JS/exercises.js"></script>
</body>
</html>
