<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP Fit | Knowledge Hub</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/components.css">
    <link rel="stylesheet" href="CSS/animations.css">
    <link rel="stylesheet" href="CSS/pages.css">
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="sidebar">
        <div class="logo"><h2>ASP Fit</h2></div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="tracker.html">Tracker</a></li>
            <li><a href="exercises.html">Exercises</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="learn.html" class="active">Learn</a></li>
            <li><a href="profile.html">Profile</a></li>
        </ul>
        <button class="nav-theme-btn" onclick="toggleTheme()">🌙 Theme</button>
    </nav>

    <main class="learn-content" role="main">

        <header class="learn-header">
            <div>
                <h1>Knowledge Hub</h1>
                <p>Science-backed articles on training, nutrition, and recovery.</p>
            </div>
        </header>

        <!-- Category filter pills -->
        <div class="filter-bar learn-filter-bar">
            <button class="filter-btn active" data-cat="All">All</button>
            <button class="filter-btn" data-cat="Training">🏋️ Training</button>
            <button class="filter-btn" data-cat="Nutrition">🥗 Nutrition</button>
            <button class="filter-btn" data-cat="Recovery">😴 Recovery</button>
            <button class="filter-btn" data-cat="Mindset">🧠 Mindset</button>
        </div>

        <!-- Articles Grid -->
        <div class="articles-grid" id="articles-grid">
            <!-- Rendered by learn.js -->
        </div>

    </main>

    <!-- Article Reading Modal -->
    <div id="article-modal" class="modal">
        <div class="modal-overlay" onclick="Learn.closeModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <span id="modal-category" class="article-category"></span>
                <button class="modal-close-btn" onclick="Learn.closeModal()">✕</button>
            </div>
            <h2 id="modal-title"></h2>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="JS/app.js"></script>
    <script src="JS/learn.js"></script>
</body>
</html>
